name: CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Image Name
        id: prep
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ steps.prep.outputs.image_name }}:latest
            ${{ steps.prep.outputs.image_name }}:${{ github.sha }}

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      APP_KEY: ${{ secrets.APP_KEY }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_CONNECTION: sqlite
      DB_DATABASE: ':memory:'
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Run Container
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker pull $IMAGE_NAME:latest
          # Mapeo de puertos: asegúrate que el 9000 coincide con el puerto de tu app en el Dockerfile
          docker run -d --name app-container -p 8000:9000 $IMAGE_NAME:latest

      - name: Wait for service to be ready
        run: |
          echo "Esperando a que el servidor inicie en el puerto 8000..."
          for i in {1..12}; do
            if curl -s http://localhost:8000/api/auth/login > /dev/null; then
              echo "Servidor listo!"
              exit 0
            fi
            echo "Esperando a que la app responda ($i/12)..."
            sleep 5
          done
          echo "Error: El servidor no respondió a tiempo."
          docker logs app-container
          exit 1