name: CD Pipeline

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Run Container
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker run -d --name app-container -p 8000:9000 ghcr.io/${{ github.repository }}:latest
          sleep 10 # Tiempo para que PHP-FPM inicie

      - name: Smoke Test
        run: |
          # Verificamos que el endpoint responde
          curl --fail http://localhost:8000/api/auth/login || exit 1